<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ted Kwon | SyllabusX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* [Prompt 1: Design System] */
        :root {
            --bg-color: #121212;      /* 눈이 편한 짙은 차콜 */
            --text-main: #F5F5F5;     /* 부드러운 화이트 */
            --text-muted: #A0A0A0;    /* 차분한 그레이 */
            --accent-gold: #D4AF37;   /* 고급스러운 골드 */
            --card-bg: #1A1A1A;       /* 카드 배경 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* Typography Scale */
        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            letter-spacing: -0.02em;
        }

        h1 { font-size: clamp(2.5rem, 8vw, 3.5rem); color: var(--accent-gold); margin-bottom: 0.5rem; }
        h2 { font-size: 2rem; margin-top: 4rem; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(212, 175, 55, 0.2); display: inline-block; }
        h3 { font-size: 1.5rem; color: var(--accent-gold); margin-bottom: 1rem; }

        /* [Prompt 2: Layout Clarity] */
        .container-custom {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        section {
            padding: 4rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* [Prompt 3: CTA Polish] */
        .cta-button {
            display: inline-block;
            background: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 14px 36px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-decoration: none;
            outline: none;
        }

        .cta-button:hover, .cta-button:focus {
            background: var(--accent-gold);
            color: var(--bg-color);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        /* [Prompt 4: Mobile & Accessibility] */
        @media (max-width: 640px) {
            h1 { font-size: 2.25rem; }
            section { padding: 3rem 0; }
            .cta-button { width: 100%; text-align: center; }
        }

        .value-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 8px;
            margin: 2rem 0;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
    </style>
</head>

        </header>
